<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add TimeSlot</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='theme.css') }}"/>
  <script src="{{ url_for('static', filename='theme.js') }}"></script>
</head>
<body>
  <div class="topbar">
    <span class="logo">🎓 Faculty Timetable</span>
    <div class="topbar-right">
      <button class="theme-toggle"></button>
      <a href="/admin" class="btn-nav">← Back to Admin</a>
    </div>
  </div>
  <div style="display:flex;align-items:center;justify-content:center;padding:40px 16px;min-height:calc(100vh - 57px);">
    <div class="card" style="width:100%;max-width:420px;">
      <h1 style="font-size:1.3rem;font-weight:700;margin-bottom:24px;">⏰ Add Time Slot</h1>
      <form method="POST">
        <div style="margin-bottom:18px;"><label>Time Slot ID</label><input type="text" name="id" placeholder="e.g. TS02" required/></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
          <div style="margin-bottom:18px;">
            <label>Start Time</label>
            <select name="start_time" required>
              <option value="" disabled selected>Select</option>
              <option>6:00 AM</option><option>6:30 AM</option>
              <option>7:00 AM</option><option>7:30 AM</option>
              <option>8:00 AM</option><option>8:30 AM</option>
              <option>9:00 AM</option><option>9:30 AM</option>
              <option>10:00 AM</option><option>10:30 AM</option>
              <option>11:00 AM</option><option>11:30 AM</option>
              <option>12:00 PM</option><option>12:30 PM</option>
              <option>1:00 PM</option><option>1:30 PM</option>
              <option>2:00 PM</option><option>2:30 PM</option>
              <option>3:00 PM</option><option>3:30 PM</option>
              <option>4:00 PM</option><option>4:30 PM</option>
              <option>5:00 PM</option><option>5:30 PM</option>
              <option>6:00 PM</option>
            </select>
          </div>
          <div style="margin-bottom:18px;">
            <label>End Time</label>
            <select name="end_time" required>
              <option value="" disabled selected>Select</option>
              <option>6:00 AM</option><option>6:30 AM</option>
              <option>7:00 AM</option><option>7:30 AM</option>
              <option>8:00 AM</option><option>8:30 AM</option>
              <option>9:00 AM</option><option>9:30 AM</option>
              <option>10:00 AM</option><option>10:30 AM</option>
              <option>11:00 AM</option><option>11:30 AM</option>
              <option>12:00 PM</option><option>12:30 PM</option>
              <option>1:00 PM</option><option>1:30 PM</option>
              <option>2:00 PM</option><option>2:30 PM</option>
              <option>3:00 PM</option><option>3:30 PM</option>
              <option>4:00 PM</option><option>4:30 PM</option>
              <option>5:00 PM</option><option>5:30 PM</option>
              <option>6:00 PM</option>
            </select>
          </div>
        </div>
        <div style="display:flex;gap:12px;margin-top:28px;">
          <a href="/admin" class="btn-secondary" style="flex:1;text-align:center;">← Cancel</a>
          <button type="submit" class="btn-primary" style="flex:1;">Add Time Slot</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
