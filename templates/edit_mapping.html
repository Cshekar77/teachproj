<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edit Mapping</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='theme.css') }}"/>
  <script src="{{ url_for('static', filename='theme.js') }}"></script>
</head>
<body>
  <div class="topbar">
    <span class="logo">🎓 Faculty Timetable</span>
    <div class="topbar-right">
      <button class="theme-toggle"></button>
      <a href="/admin" class="btn-nav">← Back to Admin</a>
    </div>
  </div>
  <div style="display:flex;align-items:center;justify-content:center;padding:40px 16px;min-height:calc(100vh - 57px);">
    <div class="card" style="width:100%;max-width:520px;">
      <h1 style="font-size:1.3rem;font-weight:700;margin-bottom:24px;">✏️ Edit Mapping</h1>
      <form method="POST">
        <div style="margin-bottom:18px;"><label>Mapping ID</label><input class="id-field" type="text" value="{{ mapping.id }}" disabled/><p class="id-note">ID cannot be changed</p></div>
        <div style="margin-bottom:18px;"><label>Faculty</label>
          <select name="faculty_id" required>{% for f in faculty %}<option value="{{ f.id }}" {% if f.id == mapping.faculty_id %}selected{% endif %}>{{ f.name }}</option>{% endfor %}</select>
        </div>
        <div style="margin-bottom:18px;"><label>Subject</label>
          <select name="subject_id" required>{% for s in subject %}<option value="{{ s.id }}" {% if s.id == mapping.subject_id %}selected{% endif %}>{{ s.subject_name }} ({{ s.subject_code }})</option>{% endfor %}</select>
        </div>
        <div style="margin-bottom:18px;"><label>Section</label>
          <select name="section_id" required>{% for sec in section %}<option value="{{ sec.id }}" {% if sec.id == mapping.section_id %}selected{% endif %}>{{ sec.section_name }} — Sem {{ sec.semester }}</option>{% endfor %}</select>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
          <div style="margin-bottom:18px;"><label>Day</label>
            <select name="day_id" required>{% for d in day %}<option value="{{ d.id }}" {% if d.id == mapping.day_id %}selected{% endif %}>{{ d.day_name }}</option>{% endfor %}</select>
          </div>
          <div style="margin-bottom:18px;"><label>Time Slot</label>
            <select name="timeslot_id" required>{% for ts in timeslot %}<option value="{{ ts.id }}" {% if ts.id == mapping.timeslot_id %}selected{% endif %}>{{ ts.start_time }} – {{ ts.end_time }}</option>{% endfor %}</select>
          </div>
        </div>
        <div style="display:flex;gap:12px;margin-top:28px;">
          <a href="/admin" class="btn-secondary" style="flex:1;text-align:center;">← Cancel</a>
          <button type="submit" class="btn-primary" style="flex:1;">Save Changes</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
