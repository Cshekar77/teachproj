<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Day</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='theme.css') }}"/>
  <script src="{{ url_for('static', filename='theme.js') }}"></script>
</head>
<body>

  <!-- TOPBAR -->
  <div class="topbar">
    <span class="logo">🎓 Faculty Timetable</span>
    <div class="topbar-right">
      <button class="theme-toggle"></button>
      <a href="/admin" class="btn-nav">← Back to Admin</a>
    </div>
  </div>

  <!-- FORM -->
  <div style="display:flex; align-items:center; justify-content:center; padding:40px 16px; min-height:calc(100vh - 57px);">
    <div class="card" style="width:100%; max-width:420px;">

      <h1 style="font-size:1.3rem; font-weight:700; margin-bottom:24px;">📅 Add Day</h1>

      <form method="POST">

        <div style="margin-bottom:18px;">
          <label>Day ID</label>
          <input type="text" name="id" placeholder="e.g. D2" required/>
        </div>

        <div style="margin-bottom:18px;">
          <label>Day Name</label>
          <input type="text" name="day_name" placeholder="e.g. Tuesday" required/>
        </div>

        <div style="display:flex; gap:12px; margin-top:28px;">
          <a href="/admin" class="btn-secondary" style="flex:1; text-align:center;">← Cancel</a>
          <button type="submit" class="btn-primary" style="flex:1;">Add Day</button>
        </div>

      </form>
    </div>
  </div>

</body>
</html>
